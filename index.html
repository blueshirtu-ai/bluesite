<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Interactive Site</title>
    <!-- CRITICAL: This link must match your filename exactly (all lowercase) -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Hi</h1>
    <p>This is my first interactive website.</p>
    <a href="https://amazon.com">amazon.com</a>
    <br>
    <nav style="float: left; width: 200px; margin-right: 20px;">
        <ul style="list-style: none; padding: 0;">
            <li><a href="https://github.com">GitHub</a></li>
            <li><a href="https://stackoverflow.com">Stack Overflow</a></li>
            <li><a href="https://dev.to">Dev.to</a></li>
            <li><a href="https://medium.com">Medium</a></li>
            <li><a href="https://codepen.io">CodePen</a></li>
        </ul>
    </nav>
    
    <!-- The Button -->
    <button id="mode-toggle">Switch Theme</button>

    <!-- The Logic -->
    <script>
        // Wait for the page to load before running the script
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById("mode-toggle");
            if (btn) {
                btn.onclick = function() {
                    document.body.classList.toggle("dark-theme");
                };
            }
        });
    </script>
</body>
</html>
