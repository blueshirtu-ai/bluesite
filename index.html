<body>
    <h1>Hello World!</h1>
    <p>This is my first interactive website.</p>
    
    <!-- The Button -->
    <button id="mode-toggle">Switch Theme</button>

    <!-- The Logic -->
    <script>
        const btn = document.getElementById("mode-toggle");
        btn.onclick = function() {
            document.body.classList.toggle("dark-theme");
        };
    </script>
</body>
